<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dulhao AI Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  height:100vh;
  display:flex;
  background: radial-gradient(circle at top,#1e3a8a,#0f172a);
  overflow:hidden;
}

/* glow background */
body::before, body::after{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  filter:blur(120px);
  opacity:0.25;
  z-index:0;
}

body::before{
  background:#3b82f6;
  top:-100px;
  left:-100px;
}

body::after{
  background:#22c55e;
  bottom:-100px;
  right:-100px;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(15px);
  border-right:1px solid rgba(255,255,255,0.1);
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:1;
}

.logo{
  font-size:20px;
  font-weight:700;
  color:white;
  margin-bottom:10px;
}

.btn{
  padding:10px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  background:#2563eb;
  transform:scale(1.05);
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  z-index:1;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  font-weight:700;
  color:white;
  background:linear-gradient(90deg,#2563eb,#22c55e);
}

/* CHAT AREA */
.chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:12px;
  border-radius:12px;
  animation:fade 0.25s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.user{
  background:#22c55e;
  color:white;
  margin-left:auto;
}

.ai{
  background:rgba(255,255,255,0.1);
  color:white;
  border:1px solid rgba(255,255,255,0.1);
}

/* INPUT BAR */
.inputBar{
  display:flex;
  padding:15px;
  background:rgba(0,0,0,0.3);
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

input::placeholder{
  color:#9ca3af;
}

.iconBtn{
  padding:10px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.1);
  color:white;
  transition:0.2s;
}

.iconBtn:hover{
  background:#2563eb;
  transform:scale(1.1);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🤖 Dulhao AI</div>

  <button class="btn">💬 Chat</button>
  <button class="btn">📄 LET Generator</button>
  <button class="btn">📁 File Upload</button>
  <button class="btn">🎤 Voice Input</button>
  <button class="btn">🧠 Memory (UI)</button>
  <button class="btn">⚙️ Settings</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    🚀 Dulhao AI Pro Interface
  </div>

  <div class="chat" id="chat"></div>

  <div class="inputBar">
    <input id="text" placeholder="Ask Dulhao AI...">

    <button class="iconBtn" onclick="send()">➤</button>
    <button class="iconBtn">🎤</button>
    <button class="iconBtn">📎</button>
  </div>

</div>

<script>

function add(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=999999;
}

/* SIMPLE FAKE AI (placeholder for real API later) */
function aiBrain(input){
  input=input.toLowerCase();

  if(input.includes("hello")) return "Hello! I am Dulhao AI 🤖";
  if(input.includes("help")) return "Try: LET generator, file upload, voice input";
  if(input.includes("what")) return "I am your AI assistant with tools + memory system UI";

  return "AI processing... (backend not connected yet) ⚡";
}

function send(){
  let text=document.getElementById("text").value;
  if(!text) return;

  add(text,"user");

  setTimeout(()=>{
    add(aiBrain(text),"ai");
  },500);

  document.getElementById("text").value="";
}

/* welcome message */
add("Welcome to Dulhao AI Pro 🚀","ai");

</script>

</body>
</html>
